<!DOCTYPE html>
<html>
<head>
  <title>AI Chatbot</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #343541;
      color: white;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    .message {
      max-width: 60%;
      padding: 10px 15px;
      margin: 10px 0;
      border-radius: 10px;
    }

    .user {
      background: #4e8cff;
      align-self: flex-end;
    }

    .bot {
      background: #444654;
      align-self: flex-start;
    }

    #input-area {
      display: flex;
      padding: 10px;
      background: #40414f;
    }

    #input {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 5px;
      outline: none;
    }

    button {
      margin-left: 10px;
      padding: 10px;
      background: #19c37d;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      color: white;
    }

    button:hover {
      background: #15a96b;
    }
  </style>
</head>

<body>

<div id="chat"></div>

<div id="input-area">
  <input id="input" placeholder="Vprašaj nekaj..." />
  <button onclick="sendMessage()">Send</button>
</div>

<script>
async function sendMessage() {
  const inputEl = document.getElementById("input");
  const message = inputEl.value;

  if (!message) return;

  addMessage(message, "user");
  inputEl.value = "";

  // loading
  const loadingEl = addMessage("Typing...", "bot");

  const res = await fetch("http://localhost:3000/chat", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ message })
  });

  const data = await res.json();

  loadingEl.remove();
  addMessage(data.reply, "bot");
}

function addMessage(text, sender) {
  const chat = document.getElementById("chat");

  const msg = document.createElement("div");
  msg.classList.add("message", sender);
  msg.innerText = text;

  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;

  return msg;
}

document.getElementById("input").addEventListener("keypress", function(e) {
  if (e.key === "Enter") {
    sendMessage();
  }
});

</script>

</body>
</html>
